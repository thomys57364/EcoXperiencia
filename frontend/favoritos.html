<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos - EcoXperiencia</title>
    <meta name="description" content="Tus experiencias guardadas en EcoXperiencia.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="page-content">
        <section class="experiences">
            <div class="container">
                <h1 class="section-title fade-up">Mis favoritos</h1>
                <p class="section-subtitle fade-up">Las experiencias que has guardado para más tarde</p>

                <div class="experiences-grid" id="favoritesGrid">
                    <!-- Cards will be loaded by JavaScript -->
                </div>
            </div>
        </section>
    </div>

    <div id="footer-container"></div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Redirect if not logged in
            if (!EcoXperiencia.Auth.isLoggedIn()) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
                return;
            }

            const grid = document.getElementById('favoritesGrid');
            const favorites = EcoXperiencia.Favorites.getExperiences();

            if (favorites.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                        </svg>
                        <h2>No tienes favoritos aún</h2>
                        <p>Explora nuestras experiencias y guarda las que más te gusten.</p>
                        <a href="explorar.html" class="btn-submit" style="display: inline-block; margin-top: var(--space-4);">Explorar experiencias</a>
                    </div>
                `;
            } else {
                grid.innerHTML = favorites.map(exp => EcoXperiencia.Components.experienceCard(exp)).join('');
            }
        });
    </script>
</body>
</html>
