<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - EcoXperiencia</title>
    <meta name="description" content="Inicia sesión en EcoXperiencia para acceder a tus experiencias favoritas.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card fade-up">
                <div class="auth-header">
                    <a href="index.html" class="auth-logo">
                        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M16 2C16 2 8 8 8 16C8 21 11 26 16 30C21 26 24 21 24 16C24 8 16 2 16 2Z" fill="currentColor" opacity="0.3"/>
                            <path d="M16 6C16 6 12 10 12 16C12 19 13.5 22 16 25C18.5 22 20 19 20 16C20 10 16 6 16 6Z" fill="currentColor"/>
                            <path d="M16 10C16 10 14 13 14 16C14 18 14.8 20 16 22C17.2 20 18 18 18 16C18 13 16 10 16 10Z" fill="currentColor" opacity="0.6"/>
                        </svg>
                        EcoXperiencia
                    </a>
                    <h1>Bienvenido de vuelta</h1>
                    <p>Inicia sesión para continuar</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com">
                        <p class="error-message" id="email-error">Email inválido</p>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                        <p class="error-message" id="password-error">Contraseña requerida</p>
                    </div>

                    <div id="form-error" class="error-message show" style="text-align: center; margin-bottom: var(--space-4);"></div>

                    <button type="submit" class="btn-submit" id="submitBtn">Iniciar sesión</button>
                </form>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            if (EcoXperiencia.Auth.isLoggedIn()) {
                const redirect = EcoXperiencia.getUrlParam('redirect') || 'perfil.html';
                window.location.href = redirect;
                return;
            }

            const form = document.getElementById('loginForm');
            const formError = document.getElementById('form-error');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                formError.textContent = '';
                formError.classList.remove('show');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Iniciando sesión...';

                const result = await EcoXperiencia.Auth.loginAsync(email, password);

                if (result.success) {
                    EcoXperiencia.Toast.show('¡Bienvenido de vuelta, ' + result.user.name + '!');
                    const redirect = EcoXperiencia.getUrlParam('redirect') || 'perfil.html';
                    setTimeout(() => { window.location.href = redirect; }, 1000);
                } else {
                    formError.textContent = result.message;
                    formError.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Iniciar sesión';
                }
            });
        });
    </script>
</body>
</html>
