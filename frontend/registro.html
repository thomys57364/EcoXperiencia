<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - EcoXperiencia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-cream) 0%, var(--color-off-white) 100%);
      padding: var(--space-6);
    }
    .auth-card {
      background: white;
      padding: var(--space-8);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 400px;
      width: 100%;
    }
    .auth-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .auth-header h1 {
      font-size: var(--font-size-2xl);
      margin-bottom: var(--space-2);
    }
    .auth-header p {
      color: var(--color-text-light);
      margin-bottom: 0;
    }
    .auth-link {
      text-align: center;
      margin-top: var(--space-6);
      color: var(--color-text-light);
    }
    .auth-link a {
      color: var(--color-moss);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>🌿 EcoXperiencia</h1>
        <p>Crea tu cuenta ahora</p>
      </div>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Nombre completo</label>
          <input 
            type="text" 
            id="name" 
            class="form-control" 
            placeholder="Tu nombre completo"
            required
          >
        </div>

        <div class="form-group">
          <label>Correo electrónico</label>
          <input 
            type="email" 
            id="email" 
            class="form-control" 
            placeholder="tu@email.com"
            required
          >
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input 
            type="password" 
            id="password" 
            class="form-control" 
            placeholder="Mínimo 6 caracteres"
            minlength="6"
            required
          >
        </div>

        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input 
            type="password" 
            id="password-confirm" 
            class="form-control" 
            placeholder="Repite tu contraseña"
            minlength="6"
            required
          >
        </div>

        <label class="checkbox">
          <input type="checkbox" id="terms" required>
          <span>Acepto los <a href="legal.html" target="_blank">términos y condiciones</a> y la <a href="legal.html" target="_blank">política de privacidad</a></span>
        </label>

        <button type="submit" class="btn btn-primary btn-block mt-6">Crear cuenta</button>
      </form>

      <div class="auth-link">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    async function handleRegister(e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('password-confirm').value;

      // Validation
      if (!name || !email || !password || !passwordConfirm) {
        Toast.show('Por favor, completa todos los campos', 'error');
        return;
      }

      if (password !== passwordConfirm) {
        Toast.show('Las contraseñas no coinciden', 'error');
        return;
      }

      if (password.length < 6) {
        Toast.show('La contraseña debe tener al menos 6 caracteres', 'error');
        return;
      }

      if (!document.getElementById('terms').checked) {
        Toast.show('Debes aceptar los términos y condiciones', 'error');
        return;
      }

      const button = e.target.querySelector('button[type="submit"]');
      button.disabled = true;
      button.textContent = 'Registrando...';

      const success = await Auth.register(name, email, password);

      if (success) {
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } else {
        button.disabled = false;
        button.textContent = 'Crear cuenta';
      }
    }
  </script>
</body>
</html>
