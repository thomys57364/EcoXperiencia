<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - EcoXperiencia</title>
    <meta name="description" content="Gestiona tu perfil y revisa tus experiencias en EcoXperiencia.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="page-content">
        <section class="profile-section">
            <div class="container">
                <div class="profile-header">
                    <div class="profile-info">
                        <div class="profile-avatar" id="userAvatar"></div>
                        <div class="profile-details">
                            <h1 id="userName">Cargando...</h1>
                            <p id="userEmail"></p>
                            <p style="color: var(--color-gray-500); font-size: var(--text-sm);">Miembro desde <span id="memberSince"></span></p>
                            <div class="profile-actions">
                                <button class="btn-secondary" onclick="window.location.href='favoritos.html'">Mis favoritos</button>
                                <button class="btn-danger" id="btnLogout">Cerrar sesión</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="profile-tabs">
                    <a href="#info" class="profile-tab active">Información</a>
                    <a href="#reservas" class="profile-tab">Mis reservas</a>
                    <a href="#favoritos" class="profile-tab">Favoritos</a>
                </div>

                <div class="card" style="background: white; border-radius: var(--radius-lg); padding: var(--space-8); box-shadow: var(--shadow-sm);">
                    <h2 style="font-family: var(--font-display); font-size: var(--text-xl); color: var(--color-moss); margin-bottom: var(--space-6);">Información personal</h2>

                    <form id="profileForm">
                        <div class="form-group">
                            <label for="editName">Nombre completo</label>
                            <input type="text" id="editName" name="name">
                        </div>

                        <div class="form-group">
                            <label for="editEmail">Email</label>
                            <input type="email" id="editEmail" name="email" disabled style="background-color: var(--color-gray-100); cursor: not-allowed;">
                        </div>

                        <div class="form-group">
                            <label for="editPhone">Teléfono</label>
                            <input type="tel" id="editPhone" name="phone" placeholder="+57 300 000 0000">
                        </div>

                        <div class="form-group">
                            <label for="editBio">Bio</label>
                            <textarea id="editBio" name="bio" rows="3" placeholder="Cuéntanos un poco sobre ti..."></textarea>
                        </div>

                        <div style="display: flex; gap: var(--space-3);">
                            <button type="submit" class="btn-submit" style="width: auto; padding: var(--space-3) var(--space-6);">Guardar cambios</button>
                            <button type="button" class="btn-secondary" id="btnChangePassword">Cambiar contraseña</button>
                        </div>
                    </form>
                </div>

                <!-- Reservas recientes -->
                <div style="margin-top: var(--space-8);">
                    <h2 style="font-family: var(--font-display); font-size: var(--text-2xl); color: var(--color-moss); margin-bottom: var(--space-6);">Reservas recientes</h2>
                    <div id="reservasList">
                        <div style="text-align: center; padding: var(--space-10); background: white; border-radius: var(--radius-lg);">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-gray-300)" stroke-width="1.5" style="margin-bottom: var(--space-4);">
                                <rect x="2" y="5" width="20" height="14" rx="2"/>
                                <line x1="2" y1="10" x2="22" y2="10"/>
                            </svg>
                            <p style="color: var(--color-gray-500);">Aún no tienes reservas. <a href="explorar.html" style="color: var(--color-moss); text-decoration: underline;">Explora experiencias</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="footer-container"></div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Redirect if not logged in
            if (!EcoXperiencia.Auth.isLoggedIn()) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
                return;
            }

            const user = EcoXperiencia.Auth.getCurrentUser();

            // Populate user data
            document.getElementById('userAvatar').textContent = user.avatar;
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('memberSince').textContent = new Date(user.createdAt).toLocaleDateString('es-CO', { year: 'numeric', month: 'long' });

            // Populate form
            document.getElementById('editName').value = user.name;
            document.getElementById('editEmail').value = user.email;
            if (user.phone) document.getElementById('editPhone').value = user.phone;
            if (user.bio) document.getElementById('editBio').value = user.bio;

            // Logout button
            document.getElementById('btnLogout').addEventListener('click', function() {
                EcoXperiencia.Auth.logout();
            });

            // Profile form
            document.getElementById('profileForm').addEventListener('submit', function(e) {
                e.preventDefault();

                const name = document.getElementById('editName').value.trim();
                const phone = document.getElementById('editPhone').value.trim();
                const bio = document.getElementById('editBio').value.trim();

                const result = EcoXperiencia.Auth.updateProfile({ name, phone, bio });

                if (result.success) {
                    document.getElementById('userName').textContent = name;
                    document.getElementById('userAvatar').textContent = name.split(' ').map(n => n[0]).join('').toUpperCase();
                    EcoXperiencia.Toast.show('Perfil actualizado correctamente');
                } else {
                    EcoXperiencia.Toast.show('Error al actualizar perfil', 'error');
                }
            });

            // Change password button (demo)
            document.getElementById('btnChangePassword').addEventListener('click', function() {
                EcoXperiencia.Modal.show(
                    'Cambiar contraseña',
                    'Esta funcionalidad estará disponible próximamente.',
                    [{ text: 'Entendido', class: 'btn-submit', onClick: 'this.closest(\'.modal-overlay\').click()' }]
                );
            });
        });
    </script>
</body>
</html>
